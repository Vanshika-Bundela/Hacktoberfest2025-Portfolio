<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Webpage</title>
</head>
<body>
    <!-- Heading -->
    <h1>Welcome to My First Webpage!</h1>
    
    <!-- Paragraph -->
    <p>This is a simple paragraph. HTML is fun and easy to learn!</p>

    <!-- Image -->
    <img src="https://via.placeholder.com/150" alt="Sample Image">

    <!-- Link -->
    <p>Visit <a href="https://www.w3schools.com" target="_blank">W3Schools</a> to learn more about HTML.</p>

    <!-- List -->
    <h2>My Favorite Fruits:</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
    </ul>

    <!-- Table -->
    <h2>Sample Table:</h2>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Alice</td>
            <td>20</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>22</td>
        </tr>
    </table>

    <!-- Button -->
    <button onclick="alert('Hello! You clicked me.')">Click Me</button>
</body>
</html>
